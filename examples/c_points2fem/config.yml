crs:
  src: epsg:4326
  dst: epsg:32719

xy_units:
  src: deg
  dst: km

depth:
  src_units: km
  src_positive: down
  dst_units: km
  dst_positive: up

anchor:
  src_geo: [-71.07, -20.09, 15.6]   # lon, lat, depth_km (positive down)
  dst: [0, 0, -21]                     # x, y, z in output units, z_positive=up

rotation:
  azimuth_deg: -10

input:
  file: ../data/cat_slab_interface.csv
  columns: [longitude, latitude, depth]
  lon_range: [-75.5, -60.0]
  lat_range: [-22.0, -18.0]
  depth_range_km: [0, 60]

output:
  format: vtp
  file: ./earthquakes_interface_fem.vtp